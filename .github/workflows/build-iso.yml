name: Build BoomerBox ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            live-build debootstrap squashfs-tools xorriso \
            isolinux syslinux-common grub-pc-bin grub-efi-amd64-bin \
            mtools dosfstools ca-certificates git sudo

      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building BoomerBox OS v$VERSION"

      - name: Configure live-build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Build ISO
        run: lb build

      - name: Collect ISO
        run: |
          mkdir -p out
          # live-build with --image-name "boomerbox-<ver>" produces e.g.
          # boomerbox-0.2.0-alpha-amd64.hybrid.iso. Catch any naming variant.
          if ls boomerbox-*.iso >/dev/null 2>&1; then
            mv boomerbox-*.iso out/
          else
            mv live-image-amd64.hybrid.iso "out/boomerbox-${{ steps.version.outputs.version }}-amd64.hybrid.iso"
          fi
          ls -la out/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: boomerbox-${{ steps.version.outputs.version }}-iso
          path: out/*.iso
          retention-days: 14

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.iso
          generate_release_notes: true
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
